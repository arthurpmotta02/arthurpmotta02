# Salvar como: .github/workflows/metrics.yml (no repo arthurpmotta02/arthurpmotta02)
# Requer o secret METRICS_TOKEN (veja instruções no chat)
name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"   # roda todo dia às 6h UTC
  workflow_dispatch:        # permite rodar manualmente na aba Actions
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # Card 1: stats gerais + conquistas (substitui GitHub Stats + troféus)
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: arthurpmotta02
          template: classic
          filename: github-metrics.svg
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C

      # Card 2: linguagens mais usadas (substitui Top Languages)
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: arthurpmotta02
          template: classic
          filename: github-languages.svg
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_ignored: html, css, tex
