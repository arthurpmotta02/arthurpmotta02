# Salvar como: .github/workflows/metrics.yml (substitui o conteúdo atual)
name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"   # roda todo dia às 6h UTC
  workflow_dispatch:        # permite rodar manualmente na aba Actions
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  # Linguagens mais usadas (github-languages.svg)
  languages:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: arthurpmotta02
          template: classic
          filename: github-languages.svg
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_ignored: html, css, tex

  # Cobrinha comendo as contribuições (cores dracula)
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: arthurpmotta02
          outputs: |
            dist/github-snake.svg?color_snake=#bd93f9&color_dots=#44475a,#6272a4,#8be9fd,#ff79c6,#50fa7b
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
